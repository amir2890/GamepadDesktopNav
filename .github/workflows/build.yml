name: Build Windows EXE

on:
  workflow_dispatch:      # lets you click "Run workflow" manually on GitHub
  push:
    branches: [ main ]    # also runs automatically every time you push to main

jobs:
  build:
    runs-on: windows-latest   # a real, free Windows VM provided by GitHub

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish a single-file exe
        run: >
          dotnet publish GamepadDesktopNav/GamepadDesktopNav.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Upload the exe as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: GamepadDesktopNav
          path: publish/GamepadDesktopNav.exe
